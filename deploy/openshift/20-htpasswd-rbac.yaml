# OPTIONAL — only apply if your cluster uses an HTPasswd IdP and you
# want Lineage to surface latent / phantom / htpasswd-backed signals.
#
# Lineage discovers the HTPasswd Secret name(s) from `oauth/cluster`
# and reads each one by exact name. It never lists Secrets cluster-wide.
#
# The default below grants `get` on the single Secret named
# `htpass-secret` in `openshift-config` — the OpenShift install
# default. To support multiple HTPasswd providers, keep the grant
# exact-name scoped and list every Secret referenced by `oauth/cluster`:
#
#     resourceNames: ["htpass-secret", "engineering-htpasswd", "ops-htpasswd"]
#
# If you don't use HTPasswd, leave this file unapplied — Lineage
# marks the dependent checks as unavailable rather than producing
# false findings.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lineage-htpasswd-reader
  namespace: openshift-config
  labels:
    app.kubernetes.io/name: lineage
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    # Extend with more exact Secret names if oauth/cluster references
    # multiple HTPasswd providers. Do not remove this exact-name scope.
    resourceNames: ["htpass-secret"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lineage-htpasswd-reader
  namespace: openshift-config
  labels:
    app.kubernetes.io/name: lineage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lineage-htpasswd-reader
subjects:
  - kind: ServiceAccount
    name: lineage
    namespace: lineage-incluster
