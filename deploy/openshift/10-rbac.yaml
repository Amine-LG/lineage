---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lineage
  namespace: lineage-incluster
---
# Cluster-wide read for everything Lineage reshapes through `oc`.
# Mirrors the resource/verb list shown on /setup. Read-only by design:
# resource reads are get/list; the only create grant is the Kubernetes
# self-review API used by `oc auth can-i`.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lineage-reader
  labels:
    app.kubernetes.io/name: lineage
rules:
  # Subjects + identity provenance
  - apiGroups: ["user.openshift.io"]
    resources: ["users", "identities", "groups"]
    verbs: ["get", "list"]
  # Namespace inventory + classification
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["project.openshift.io"]
    resources: ["projects"]
    verbs: ["get", "list"]
  # ServiceAccount inventory
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list"]
  # RBAC engine
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "roles", "clusterrolebindings", "rolebindings"]
    verbs: ["get", "list"]
  # IdP discovery + cluster version (the latter is the OpenShift-version
  # source of truth for in-pod oc, which does not populate
  # releaseClientVersion / openshiftVersion the way a host-installed oc does).
  - apiGroups: ["config.openshift.io"]
    resources: ["oauths", "clusterversions"]
    verbs: ["get", "list"]
  # Workload graph
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  # SCC inventory + chain
  - apiGroups: ["security.openshift.io"]
    resources: ["securitycontextconstraints"]
    verbs: ["get", "list"]
  # ImageStream usage
  - apiGroups: ["image.openshift.io"]
    resources: ["imagestreams"]
    verbs: ["get", "list"]
  # `oc auth can-i` self-check used to derive is_admin. This is a
  # self-review API permission, not a mutating permission on inspected
  # cluster resources.
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews", "selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lineage-reader
  labels:
    app.kubernetes.io/name: lineage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lineage-reader
subjects:
  - kind: ServiceAccount
    name: lineage
    namespace: lineage-incluster
