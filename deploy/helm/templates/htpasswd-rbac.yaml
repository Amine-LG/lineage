{{- if .Values.htpasswd.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "lineage.fullname" . }}-htpasswd-reader
  namespace: {{ .Values.htpasswd.namespace | quote }}
rules:
  - apiGroups: [""]
    resources:
      - secrets
    resourceNames:
      {{- toYaml .Values.htpasswd.secretNames | nindent 6 }}
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "lineage.fullname" . }}-htpasswd-reader
  namespace: {{ .Values.htpasswd.namespace | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "lineage.fullname" . }}-htpasswd-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name | quote }}
    namespace: {{ .Values.namespace.name | quote }}
{{- end }}
