apiVersion: v1
kind: Service
metadata:
  name: {{ include "lineage.fullname" . }}
  namespace: {{ .Values.namespace.name | quote }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: lineage
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
